# VeloxServe Configuration

server {
    listen 8080;
    server_name localhost;
    root ./www;

    client_max_body_size 10M;
    rate_limit 100;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    location / {
        root ./www;
        index index.html;
        methods GET HEAD;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        methods GET POST PUT DELETE;
    }

    location /static {
        root ./www/static;
        methods GET HEAD;
    }
}
