<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloxServe</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); max-width: 500px; }
        h1 { font-size: 2.5em; margin: 0 0 8px 0; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #94a3b8; font-size: 1.1em; margin-bottom: 24px; }
        .status { background: #065f46; color: #6ee7b7; padding: 8px 20px; border-radius: 999px; display: inline-block; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ VeloxServe</h1>
        <p class="subtitle">High-Performance C++ HTTP Server &amp; Reverse Proxy</p>
        <span class="status">● Server is running</span>
    </div>
</body>
</html>
